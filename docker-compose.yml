version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: lab-password
      MYSQL_DATABASE: b2bmarket
      MYSQL_USER: admin
      MYSQL_PASSWORD: lab-password
    ports:
      - "3306:3306"
    volumes:
      - ./deployment/db-init.sql:/docker-entrypoint-initdb.d/init.sql
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  shop:
    build: ./microservices/shop
    ports:
      - "8080:8080"
    environment:
      APP_DB_HOST: db
      APP_DB_USER: admin
      APP_DB_PASSWORD: lab-password
      APP_DB_NAME: b2bmarket
      APP_DB_PORT: 3306
      PORT: 8080
      SHOP_URL: "http://localhost:8080/"
      SUPPLIER_URL: "http://localhost:8081/admin/"
    depends_on:
      db:
        condition: service_healthy

  supplier:
    build: ./microservices/supplier
    ports:
      - "8081:8080"
    environment:
      APP_DB_HOST: db
      APP_DB_USER: admin
      APP_DB_PASSWORD: lab-password
      APP_DB_NAME: b2bmarket
      APP_DB_PORT: 3306
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
